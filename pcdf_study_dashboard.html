<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard de Estudos — Delegado PCDF</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#f5f5f0;color:#1a1a1a;padding:1rem}
.wrap{max-width:900px;margin:0 auto;padding:1rem 0}
.hdr{margin-bottom:1.25rem}
.title{font-size:17px;font-weight:500;color:#1a1a1a}
.subtitle{font-size:12px;color:#666;margin-top:3px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1.25rem}
.stat{background:#e8e8e2;border-radius:8px;padding:12px}
.sn{font-size:21px;font-weight:500;color:#1a1a1a}
.sl{font-size:11px;color:#666;margin-top:2px}
.sn.g{color:#1a7a4a}
.sn.a{color:#b87400}
.sn.p{color:#666}
.global-bar{height:6px;background:#d0d0c8;border-radius:3px;margin-bottom:1.25rem;overflow:hidden}
.global-fill{height:100%;border-radius:3px;background:#1a7a4a;transition:width .4s}
.filters{display:flex;gap:6px;margin-bottom:1rem;flex-wrap:wrap}
.fb{padding:5px 12px;border:0.5px solid #999;border-radius:20px;font-size:12px;cursor:pointer;background:transparent;color:#666;font-family:inherit;transition:all .15s}
.fb:hover{border-color:#333}
.fb.on{background:#e8e8e2;color:#1a1a1a;border-color:#333;font-weight:500}
.card{border:0.5px solid #d0d0c8;border-radius:12px;margin-bottom:8px;overflow:hidden;background:#fff}
.sh{display:flex;align-items:center;padding:12px 16px;cursor:pointer;gap:10px;user-select:none;transition:background .1s}
.sh:hover{background:#f5f5f0}
.dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.sname{flex:1;font-size:13.5px;font-weight:500;color:#1a1a1a}
.spct{font-size:11.5px;color:#666;margin-right:4px}
.chev{font-size:10px;color:#999;transition:transform .2s}
.chev.open{transform:rotate(90deg)}
.pb{height:3px;background:#e0e0d8;margin:0 16px 0}
.pf{height:100%;border-radius:2px;transition:width .35s}
.topics-wrap{display:none}
.topics-wrap.open{display:block}
.tr{display:flex;align-items:flex-start;gap:8px;padding:7px 16px;border-top:0.5px solid #e8e8e2;transition:background .1s}
.tr:hover{background:#f8f8f4}
.tr.done .tl{text-decoration:line-through;color:#aaa}
.tl{flex:1;font-size:12.5px;color:#1a1a1a;line-height:1.45;padding-top:1px}
.tl.lei{font-style:italic;color:#666}
.lei-badge{font-size:10px;background:#e8e8e2;border:0.5px solid #d0d0c8;border-radius:4px;padding:1px 5px;color:#888;margin-right:5px;font-style:normal;vertical-align:middle}
.checks{display:flex;gap:0;flex-shrink:0}
.ci{display:flex;flex-direction:column;align-items:center;gap:3px;width:70px}
.ci span{font-size:9px;color:#999;white-space:nowrap}
input[type=checkbox]{width:16px;height:16px;cursor:pointer;accent-color:#1a7a4a}
input[type=checkbox].rev{accent-color:#b87400}
.col-hdr{display:flex;justify-content:flex-end;padding:8px 16px 0;gap:0}
.ch{font-size:10px;color:#999;width:70px;text-align:center}
.empty{text-align:center;padding:2rem;color:#999;font-size:13px}
.saving{font-size:11px;color:#999;text-align:right;padding:4px 0;height:20px;transition:opacity .3s}
@media(max-width:600px){.stats{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <div class="title">Dashboard de Estudos — Delegado PCDF</div>

let state={}, filter='all', expanded=new Set();

function load(){
  try{const s=localStorage.getItem('pcdf-dash-v2');if(s)state=JSON.parse(s);}catch(e){state={};}
}
function save(){
  clearTimeout(window._sv);
  window._sv=setTimeout(()=>{
    try{localStorage.setItem('pcdf-dash-v2',JSON.stringify(state));showSaving();}catch(e){}
  },400);
}
function showSaving(){
  const el=document.getElementById('saving');
  el.textContent='Progresso salvo';
  el.style.opacity='1';
  clearTimeout(window._st);
  window._st=setTimeout(()=>{el.style.opacity='0';},1800);
}

function gs(id){return state[id]||{e:false,r:false};}

function totals(){
  let tot=0,est=0,rev=0;
  SUBJS.forEach(s=>s.topics.forEach(t=>{tot++;const q=gs(t.id);if(q.e)est++;if(q.r)rev++;}));
  return{tot,est,rev};
}
function subjProg(s){
  let tot=s.topics.length,est=0,rev=0;
  s.topics.forEach(t=>{const q=gs(t.id);if(q.e)est++;if(q.r)rev++;});
  return{tot,est,rev};
}
function filterTopics(topics){
  if(filter==='all')return topics;
  if(filter==='e')return topics.filter(t=>gs(t.id).e);
  if(filter==='r')return topics.filter(t=>gs(t.id).r);
  if(filter==='p')return topics.filter(t=>{const q=gs(t.id);return!q.e&&!q.r;});
  return topics;
}

function renderStats(){
  const{tot,est,rev}=totals();
  const pend=tot-est;
  const pct=tot?Math.round(est/tot*100):0;
  document.getElementById('stats').innerHTML=`
    <div class="stat"><div class="sn">${tot}</div><div class="sl">Tópicos totais</div></div>
    <div class="stat"><div class="sn g">${est}</div><div class="sl">Estudados (${pct}%)</div></div>
    <div class="stat"><div class="sn a">${rev}</div><div class="sl">A revisar</div></div>
    <div class="stat"><div class="sn p">${pend}</div><div class="sl">Pendentes</div></div>
  `;
  document.getElementById('global-bar').style.width=pct+'%';
}

function renderFilters(){
  const fs=[{k:'all',l:'Todos'},{k:'p',l:'Pendentes'},{k:'e',l:'Estudados'},{k:'r',l:'A revisar'}];
  document.getElementById('filters').innerHTML=fs.map(f=>
    `<button class="fb${filter===f.k?' on':''}" onclick="setFilter('${f.k}')">${f.l}</button>`
  ).join('');
}

function renderList(){
  const el=document.getElementById('list');
  let html='';
  SUBJS.forEach(s=>{
    const vis=filterTopics(s.topics);
    if(!vis.length&&filter!=='all')return;
    const p=subjProg(s);
    const pct=Math.round(p.est/p.tot*100);
    const open=expanded.has(s.id);
    html+=`<div class="card">
      <div class="sh" onclick="toggle('${s.id}')">
        <div class="dot" style="background:${s.color}"></div>
        <div class="sname">${s.name}</div>
        <div class="spct">${p.est}/${p.tot} · ${pct}%</div>
        <div class="chev${open?' open':''}">&#9654;</div>
      </div>
      <div class="pb"><div class="pf" style="width:${pct}%;background:${s.color}"></div></div>
      <div class="topics-wrap${open?' open':''}">
        <div class="col-hdr">
          <span class="ch">Estudado</span>
          <span class="ch">Revisar</span>
        </div>
        ${vis.map(topic=>{
          const q=gs(topic.id);
          return`<div class="tr${q.e?' done':''}">
            <div class="tl${topic.lei?' lei':''}">${topic.lei?'<span class="lei-badge">LEG</span>':''}${topic.l}</div>
            <div class="checks">
              <div class="ci"><input type="checkbox"${q.e?' checked':''} onchange="chk('${topic.id}','e',this.checked)"></div>
              <div class="ci"><input type="checkbox" class="rev"${q.r?' checked':''} onchange="chk('${topic.id}','r',this.checked)"></div>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  });
  if(!html)html='<div class="empty">Nenhum tópico encontrado para este filtro.</div>';
  el.innerHTML=html;
}

function render(){renderStats();renderFilters();renderList();}

window.toggle=id=>{expanded.has(id)?expanded.delete(id):expanded.add(id);renderList();};
window.setFilter=f=>{filter=f;render();};
window.chk=(id,field,val)=>{
  if(!state[id])state[id]={e:false,r:false};
  state[id][field]=val;
  save();
  render();
};

load();
render();
</script>
